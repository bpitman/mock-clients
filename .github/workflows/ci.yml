name: CI

on:
  push:
    branches: [main]
    tags: ["*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: sbt

      - uses: sbt/setup-sbt@v1

      - name: Compile
        run: sbt +compile

      - name: Test
        run: sbt +test

      - name: Package
        run: sbt +package

      - uses: actions/upload-artifact@v4
        with:
          name: jars
          path: "**/target/scala-*/mock-clients-*.jar"

      - name: Create release and upload assets
        if: startsWith(github.ref, 'refs/tags/')
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" --generate-notes */target/scala-*/mock-clients-*.jar
